name: Update Release

# Triggered by the private Android repo's release workflow via repository_dispatch,
# or manually with a version input.
on:
  repository_dispatch:
    types: [android-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
      aar_url:
        description: 'URL to AAR file'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version from dispatch
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.client_payload.aar_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "url=${{ github.event.inputs.aar_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/implementation(\"app.appsprint:sdk:.*\")/implementation(\"app.appsprint:sdk:${VERSION}\")/" README.md

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" || git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin main --tags

      - name: Download and re-upload AAR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -L -o appsprint-sdk.aar "${{ steps.version.outputs.url }}"
          gh release create "${VERSION}" \
            appsprint-sdk.aar \
            --title "AppSprint Android SDK ${VERSION}" \
            --notes "Obfuscated AAR for AppSprint Android SDK ${VERSION}"
          rm appsprint-sdk.aar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
